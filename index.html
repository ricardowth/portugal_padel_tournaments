<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendário Padel 2026 - FPP</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body data-page="calendar">
    <div id="sharedHeader"></div>

    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">Torneios</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="fipCount">0</div>
        <div class="stat-label">Provas FIP</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="visibleCount">0</div>
        <div class="stat-label">A mostrar</div>
      </div>
    </div>

    <div class="container">
      <div class="filters-wrapper">
        <div class="filters-section">
          <div class="filters-header">
            <div class="filters-title">Pesquisar</div>
          </div>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Pesquisar por nome do torneio..."
          />
        </div>

        <div class="filters-section">
          <div class="filters-header">
            <div class="filters-title">Período</div>
          </div>
          <div
            style="
              display: flex;
              gap: 0.5rem;
              align-items: center;
              flex-wrap: wrap;
            "
          >
            <select
              id="monthFrom"
              class="search-input"
              style="width: auto; flex: 1; min-width: 120px"
            >
              <option value="0">Janeiro</option>
              <option value="1">Fevereiro</option>
              <option value="2">Março</option>
              <option value="3">Abril</option>
              <option value="4">Maio</option>
              <option value="5">Junho</option>
              <option value="6">Julho</option>
              <option value="7">Agosto</option>
              <option value="8">Setembro</option>
              <option value="9">Outubro</option>
              <option value="10">Novembro</option>
              <option value="11">Dezembro</option>
            </select>
            <span style="color: var(--text-light); font-size: 0.8rem">até</span>
            <select
              id="monthTo"
              class="search-input"
              style="width: auto; flex: 1; min-width: 120px"
            >
              <option value="0">Janeiro</option>
              <option value="1">Fevereiro</option>
              <option value="2">Março</option>
              <option value="3">Abril</option>
              <option value="4">Maio</option>
              <option value="5">Junho</option>
              <option value="6">Julho</option>
              <option value="7">Agosto</option>
              <option value="8">Setembro</option>
              <option value="9">Outubro</option>
              <option value="10">Novembro</option>
              <option value="11">Dezembro</option>
            </select>
          </div>
        </div>

        <div class="filters-section">
          <div class="filters-header">
            <div class="filters-title">Filtrar por categoria</div>
            <button class="filters-clear" id="clearFilters">
              Limpar filtros
            </button>
          </div>
          <div class="filters-hint">Clica em vários filtros para combinar</div>
          <div class="filters" id="filterContainer"></div>
        </div>
      </div>

      <div class="content-wrapper">
        <div class="map-section">
          <div class="map-section-header" id="mapToggle">
            <span class="map-section-title">Mapa de Torneios</span>
            <span class="map-toggle-icon" id="mapToggleIcon">&#9650;</span>
          </div>
          <div id="mapContainer"></div>
        </div>

        <div id="noResults" class="no-results">
          Nenhum torneio encontrado para este filtro.
        </div>
        <div id="tournamentsContainer"></div>
      </div>
    </div>

    <div class="footer">
      Fonte: Calendário de Actividades Provisório 2026 &mdash; Federação
      Portuguesa de Padel
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg id="sunIcon" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="5" />
        <line
          x1="12"
          y1="1"
          x2="12"
          y2="3"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="12"
          y1="21"
          x2="12"
          y2="23"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="4.22"
          y1="4.22"
          x2="5.64"
          y2="5.64"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="18.36"
          y1="18.36"
          x2="19.78"
          y2="19.78"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="1"
          y1="12"
          x2="3"
          y2="12"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="21"
          y1="12"
          x2="23"
          y2="12"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="4.22"
          y1="19.78"
          x2="5.64"
          y2="18.36"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="18.36"
          y1="5.64"
          x2="19.78"
          y2="4.22"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      <svg
        id="moonIcon"
        viewBox="0 0 24 24"
        fill="currentColor"
        style="display: none"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>

    <script src="./scripts/shared-header.js"></script>
    <script src="./data/tournaments.js"></script>
    <script src="./scripts/main.js"></script>

  </body>
</html>
