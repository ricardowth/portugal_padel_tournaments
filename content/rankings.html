<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rankings Absolutos - Padel Portugal</title>
    <script src="../scripts/shared-social-meta.js"></script>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body data-page="rankings">
    <div id="sharedHeader"></div>

    <main class="calc-layout rankings-layout">
      <section class="calc-card">
        <div class="filters-header" style="margin-bottom: 0.9rem">
          <div>
            <div class="filters-title">Rankings Absolutos</div>
            <div class="filters-hint" id="rankingsMeta" style="margin: 0.25rem 0 0">
              A carregar ranking...
            </div>
          </div>
        </div>

        <div class="rankings-filters" aria-label="Pesquisa e filtros de ranking">
          <select id="rankingsSource" class="search-input">
            <option value="male" selected>Absolutos Masculino</option>
            <option value="female">Absolutos Feminino</option>
          </select>
          <input
            id="rankingsSearch"
            class="search-input"
            type="text"
            placeholder="Pesquisar por nome, clube ou licença..."
          />
          <select id="rankingsFilterLevel" class="search-input">
            <option value="all">Todos os níveis</option>
          </select>
          <select id="rankingsFilterAge" class="search-input">
            <option value="all">Todos os escalões</option>
          </select>
          <select id="rankingsFilterClub" class="search-input">
            <option value="all">Todos os clubes</option>
          </select>
        </div>

        <div class="calc-table-wrapper">
          <table class="calc-table rankings-table" id="rankingsTable">
            <thead>
              <tr>
                <th>Pos.</th>
                <th>Var.</th>
                <th>Licença</th>
                <th>Nome</th>
                <th>Pontos</th>
                <th>Clube</th>
                <th>Nível</th>
                <th>Escalão</th>
                <th>Torneios</th>
                <th>Stats TiePadel</th>
              </tr>
            </thead>
            <tbody id="rankingsBody"></tbody>
          </table>
        </div>

        <div class="rankings-pagination" aria-label="Paginação de ranking">
          <button class="filter-btn" id="rankingsPrevPage" type="button">Anterior</button>
          <span class="rankings-page-info" id="rankingsPageInfo">Página 1 de 1</span>
          <button class="filter-btn" id="rankingsNextPage" type="button">Seguinte</button>
        </div>
      </section>
    </main>

    <script src="../scripts/shared-header.js"></script>
    <script src="../scripts/shared-theme.js"></script>
    <script src="../data/rankings/male/latest.js"></script>
    <script src="../data/rankings/female/latest.js"></script>
    <script src="../scripts/rankings-combined.js"></script>
  </body>
</html>
