<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranking Absoluto Masculino - Padel Portugal</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body data-page="male-abs-rankings">
    <div id="sharedHeader"></div>

    <main class="calc-layout rankings-layout">
      <section class="calc-card">
        <div class="filters-header" style="margin-bottom: 0.9rem">
          <div>
            <div class="filters-title">Ranking Absoluto Masculino</div>
            <div class="filters-hint" id="maleRankingsMeta" style="margin: 0.25rem 0 0">
              A carregar ranking...
            </div>
          </div>
        </div>

        <div class="rankings-filters" aria-label="Pesquisa e filtros de ranking">
          <input
            id="maleSearch"
            class="search-input"
            type="text"
            placeholder="Pesquisar por nome ou clube..."
          />
          <select id="maleFilterLevel" class="search-input">
            <option value="all">Todos os níveis</option>
          </select>
          <select id="maleFilterAge" class="search-input">
            <option value="all">Todos os escalões</option>
          </select>
          <select id="maleFilterClub" class="search-input">
            <option value="all">Todos os clubes</option>
          </select>
        </div>

        <div class="calc-table-wrapper">
          <table class="calc-table rankings-table" id="maleRankingsTable">
            <thead>
              <tr>
                <th>Pos.</th>
                <th>Var.</th>
                <th>Nome</th>
                <th>Pontos</th>
                <th>Clube</th>
                <th>Nível</th>
                <th>Escalão</th>
                <th>Torneios válidos</th>
              </tr>
            </thead>
            <tbody id="maleRankingsBody"></tbody>
          </table>
        </div>

        <div class="rankings-pagination" id="maleRankingsPagination" aria-label="Paginação de ranking">
          <button class="filter-btn" id="malePrevPage" type="button">Anterior</button>
          <span class="rankings-page-info" id="malePageInfo">Página 1 de 1</span>
          <button class="filter-btn" id="maleNextPage" type="button">Seguinte</button>
        </div>
      </section>
    </main>

    <script src="../scripts/shared-header.js"></script>
    <script src="../scripts/shared-theme.js"></script>
    <script src="../data/rankings/male/latest.js"></script>
    <script src="../scripts/male-rankings.js"></script>
  </body>
</html>
